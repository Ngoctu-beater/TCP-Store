<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Địa chỉ</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#00c7c7",
              "background-light": "#ffffff",
              "background-dark": "#17191c",
              "sale-red": "#ef4444",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              display: ["Inter", "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      body {
        font-family: "Inter", sans-serif;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .material-symbols-outlined.filled {
        font-variation-settings:
          "FILL" 1,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }

      .mega-menu-trigger:hover .mega-menu-content {
        display: flex;
      }
      .category-item:hover .subcategory-panel {
        display: block;
      }
      .modal {
            display: none;
            position: fixed;
            z-index: 50;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        .modal.active {
            display: flex;
        }
    </style>
  </head>
</head>
<body class="bg-background-light dark:bg-background-dark text-[#101818] dark:text-white antialiased">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <div id="header-placeholder"></div>

        <main class="flex-1 w-full max-w-[1440px] mx-auto px-4 md:px-10 py-6 md:py-10">
            <div class="flex flex-col lg:flex-row gap-8">
                <aside id="sidebar-placeholder" class="w-full lg:w-64 shrink-0"></aside>

                <div class="flex-1 w-full">
                    <div class="bg-white dark:bg-[#1e2125] rounded-xl shadow-sm border border-gray-100 dark:border-gray-800 p-6 mb-6">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <h2 class="text-xl font-bold text-[#101818] dark:text-white">Địa chỉ của tôi</h2>
                                <p class="text-sm text-gray-500 dark:text-gray-400">Quản lý các địa chỉ nhận hàng của bạn</p>
                            </div>
                            <button onclick="toggleModal()" class="flex items-center gap-2 bg-cyan-500 hover:bg-cyan-600 text-white px-5 py-2.5 rounded-xl font-bold transition-all shadow-lg shadow-cyan-500/20">
                                <span class="material-symbols-outlined text-sm">add</span>
                                Thêm địa chỉ mới
                            </button>
                        </div>
                    </div>

                    <div id="address-list-container" class="bg-white dark:bg-[#1e2125] rounded-xl shadow-sm border border-gray-100 dark:border-gray-800 divide-y divide-gray-100 dark:divide-gray-800"></div>
                </div>
            </div>

            <div id="address-modal" class="fixed inset-0 z-50 hidden bg-black/50 flex items-center justify-center backdrop-blur-sm transition-opacity">
                <div class="bg-white dark:bg-[#1e2125] rounded-2xl shadow-xl w-full max-w-xl p-8 relative animate-fade-in-up mx-4">
                    <button onclick="toggleModal()" class="absolute top-5 right-5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                        <span class="material-symbols-outlined">close</span>
                    </button>

                    <h3 class="text-xl font-bold text-[#101818] dark:text-white mb-6">
                        Địa chỉ mới <span class="text-sm font-normal text-gray-500 ml-2">(Thông tin vận chuyển)</span>
                    </h3>

                    <form id="address-form" class="space-y-5">
                        <input type="hidden" id="address-id">

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <input id="receiverName" required type="text" placeholder="Họ và tên" class="w-full bg-gray-50 dark:bg-[#1a1d21] border border-gray-200 dark:border-gray-700 rounded-xl py-3 px-4 text-sm focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 dark:text-white outline-none">
                                <span id="error-receiverName" class="text-red-500 text-[10px] hidden"></span>
                            </div>

                            <div>
                                <input id="phoneNumber" required type="text" placeholder="Số điện thoại" class="w-full bg-gray-50 dark:bg-[#1a1d21] border border-gray-200 dark:border-gray-700 rounded-xl py-3 px-4 text-sm focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 dark:text-white outline-none">
                                <span id="error-phoneNumber" class="text-red-500 text-[10px] hidden"></span>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <input id="provinceCity" required type="text" placeholder="Tỉnh/Thành phố" class="w-full bg-gray-50 dark:bg-[#1a1d21] border border-gray-200 dark:border-gray-700 rounded-xl py-3 px-4 text-sm focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 dark:text-white outline-none">
                                <span id="error-provinceCity" class="text-red-500 text-[10px] hidden"></span>
                            </div>

                            <div>
                                <input id="district" required type="text" placeholder="Quận/Huyện" class="w-full bg-gray-50 dark:bg-[#1a1d21] border border-gray-200 dark:border-gray-700 rounded-xl py-3 px-4 text-sm focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 dark:text-white outline-none">
                                <span id="error-district" class="text-red-500 text-[10px] hidden"></span>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <input id="ward" required type="text" placeholder="Phường/Xã" class="w-full bg-gray-50 dark:bg-[#1a1d21] border border-gray-200 dark:border-gray-700 rounded-xl py-3 px-4 text-sm focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 dark:text-white outline-none">
                                <span id="error-ward" class="text-red-500 text-[10px] hidden"></span>
                            </div>
                            <div>
                                <input id="detailAddress" required type="text" placeholder="Số nhà, tên đường" class="w-full bg-gray-50 dark:bg-[#1a1d21] border border-gray-200 dark:border-gray-700 rounded-xl py-3 px-4 text-sm focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 dark:text-white outline-none">
                                <span id="error-detailAddress" class="text-red-500 text-[10px] hidden"></span>
                            </div>
                        </div>

                        <div class="flex items-center gap-3 py-2">
                            <input id="isDefault" type="checkbox" class="w-5 h-5 accent-cyan-500 rounded-md border-gray-300">
                            <label for="isDefault" class="text-sm font-medium text-gray-600 dark:text-gray-400">Đặt làm địa chỉ mặc định</label>
                        </div>

                        <div class="flex justify-end gap-3 pt-4 border-t border-gray-100 dark:border-gray-800">
                            <button type="button" onclick="toggleModal()" class="px-8 py-3 text-sm font-bold text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">Trở Lại</button>
                            <button type="button" onclick="AddressManager.save()" class="bg-cyan-500 hover:bg-cyan-600 text-white px-10 py-3 rounded-xl font-bold transition-all shadow-lg shadow-cyan-500/20">
                                Hoàn thành
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <div id="footer-placeholder"></div>
    </div>  
</body>
<script src="js/common.js"></script>
<script src="js/address.js"></script>
</html>
