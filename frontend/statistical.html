<!doctype html>
<html class="light" lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Thống kê tổng hợp</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#1d7fe2",
              "background-light": "#f6f7f8",
              "background-dark": "#111921",
              "surface-light": "#ffffff",
              "surface-dark": "#1a242f",
            },
            fontFamily: {
              display: ["Manrope", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        font-size: 24px;
      }
      .filled {
        font-variation-settings:
          "FILL" 1,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-[#111417] overflow-hidden"
  >
    <div class="flex h-screen w-full">
      <div id="admin-sidebar-placeholder" class="contents"></div>
      <main
        class="flex-1 flex flex-col h-full overflow-hidden relative bg-background-light"
      >
        <div id="admin-header-placeholder" class="contents"></div>
        <div class="flex-1 overflow-y-auto p-6">
          <div class="max-w-[1400px] mx-auto flex flex-col gap-6">
            <div
              class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-surface-light p-4 rounded-xl border border-[#e5e7eb] shadow-sm"
            >
              <div
                class="flex items-center gap-2 overflow-x-auto w-full sm:w-auto pb-2 sm:pb-0"
              >
                <button
                  data-filter="today"
                  class="filter-btn px-4 py-2 rounded-lg bg-[#f0f2f4] text-sm font-medium text-[#637588] hover:bg-primary/10 hover:text-primary transition-colors whitespace-nowrap"
                >
                  Hôm nay
                </button>
                <button
                  data-filter="week"
                  class="filter-btn px-4 py-2 rounded-lg bg-[#f0f2f4] text-sm font-medium text-[#637588] hover:bg-primary/10 hover:text-primary transition-colors whitespace-nowrap"
                >
                  Tuần này
                </button>
                <button
                  data-filter="month"
                  class="filter-btn px-4 py-2 rounded-lg bg-primary text-sm font-medium text-white shadow-sm whitespace-nowrap"
                >
                  Tháng này
                </button>
                <button
                  data-filter="year"
                  class="filter-btn px-4 py-2 rounded-lg bg-[#f0f2f4] text-sm font-medium text-[#637588] hover:bg-primary/10 hover:text-primary transition-colors whitespace-nowrap"
                >
                  Năm nay
                </button>
              </div>
              <div class="flex items-center gap-2 w-full sm:w-auto">
                <span class="text-sm font-medium text-[#637588]"
                  >Tùy chỉnh:</span
                >
                <div class="relative flex-1 sm:flex-none">
                  <span
                    class="material-symbols-outlined absolute left-2.5 top-2 text-[#637588] text-[20px]"
                    >calendar_today</span
                  >
                  <input
                    id="filter-date"
                    class="h-9 pl-9 pr-3 rounded-lg border border-[#e5e7eb] bg-[#f9fafb] text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary w-full"
                    type="date"
                  />
                </div>
              </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
              <div
                class="bg-surface-light p-5 rounded-xl border border-[#e5e7eb] shadow-sm flex flex-col gap-4"
              >
                <div class="flex justify-between items-start">
                  <div class="p-2 bg-blue-50 rounded-lg text-primary">
                    <span class="material-symbols-outlined filled"
                      >group_add</span
                    >
                  </div>
                  <span
                    id="stat-new-users-growth"
                    class="flex items-center text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded-full"
                  >
                    --
                  </span>
                </div>
                <div>
                  <p class="text-[#637588] text-sm font-medium">
                    Người dùng mới
                  </p>
                  <h3
                    id="stat-new-users"
                    class="text-[#111417] text-2xl font-bold mt-1"
                  >
                    --
                  </h3>
                </div>
                <div class="h-10 w-full mt-2 relative overflow-hidden"></div>
              </div>
              <div
                class="bg-surface-light p-5 rounded-xl border border-[#e5e7eb] shadow-sm flex flex-col gap-4"
              >
                <div class="flex justify-between items-start">
                  <div class="p-2 bg-purple-50 rounded-lg text-purple-600">
                    <span class="material-symbols-outlined filled"
                      >shopping_cart</span
                    >
                  </div>
                  <span
                    id="stat-total-orders-growth"
                    class="flex items-center text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded-full"
                  >
                    --
                  </span>
                </div>
                <div>
                  <p class="text-[#637588] text-sm font-medium">
                    Tổng đơn hàng
                  </p>
                  <h3
                    id="stat-total-orders"
                    class="text-[#111417] text-2xl font-bold mt-1"
                  >
                    --
                  </h3>
                </div>
                <div
                  class="w-full bg-[#f0f2f4] rounded-full h-1.5 mt-auto"
                ></div>
              </div>
              <div
                class="bg-surface-light p-5 rounded-xl border border-[#e5e7eb] shadow-sm flex flex-col gap-4"
              >
                <div class="flex justify-between items-start">
                  <div class="p-2 bg-green-50 rounded-lg text-green-600">
                    <span class="material-symbols-outlined filled"
                      >payments</span
                    >
                  </div>
                  <span
                    id="stat-net-revenue-growth"
                    class="flex items-center text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded-full"
                  >
                    --
                  </span>
                </div>
                <div>
                  <p class="text-[#637588] text-sm font-medium">
                    Doanh thu thuần
                  </p>
                  <h3
                    id="stat-net-revenue"
                    class="text-[#111417] text-2xl font-bold mt-1"
                  >
                    --
                  </h3>
                </div>
                <div
                  class="w-full bg-[#f0f2f4] rounded-full h-1.5 mt-auto"
                ></div>
              </div>
              <div
                class="bg-surface-light p-5 rounded-xl border border-[#e5e7eb] shadow-sm flex flex-col gap-4"
              >
                <div class="flex justify-between items-start">
                  <div class="p-2 bg-red-50 rounded-lg text-red-600">
                    <span class="material-symbols-outlined filled">cancel</span>
                  </div>
                  <span
                    id="stat-cancel-rate-growth"
                    class="flex items-center text-xs font-bold text-red-600 bg-red-50 px-2 py-1 rounded-full"
                  >
                    --
                  </span>
                </div>
                <div>
                  <p class="text-[#637588] text-sm font-medium">
                    Tỷ lệ hủy đơn
                  </p>
                  <h3
                    id="stat-cancel-rate"
                    class="text-[#111417] text-2xl font-bold mt-1"
                  >
                    --
                  </h3>
                </div>
                <div
                  class="w-full bg-[#f0f2f4] rounded-full h-1.5 mt-auto"
                ></div>
              </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div
                class="lg:col-span-2 bg-surface-light rounded-xl border border-[#e5e7eb] shadow-sm p-6 flex flex-col"
              >
                <div class="flex justify-between items-center mb-6">
                  <h3 class="text-[#111417] text-lg font-bold">
                    Doanh thu &amp; Lợi nhuận
                  </h3>
                  <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                      <span class="size-3 rounded-full bg-primary"></span>
                      <span class="text-sm text-[#637588]">Doanh thu</span>
                    </div>
                    <div class="flex items-center gap-2">
                      <span class="size-3 rounded-full bg-green-500"></span>
                      <span class="text-sm text-[#637588]">Lợi nhuận</span>
                    </div>
                  </div>
                </div>
                <div class="flex-1 w-full min-h-[300px] relative">
                  <canvas id="revenueChart"></canvas>
                </div>
              </div>
              <div
                class="lg:col-span-1 bg-surface-light rounded-xl border border-[#e5e7eb] shadow-sm p-6 flex flex-col h-full"
              >
                <div class="flex justify-between items-center mb-6">
                  <h3 class="text-[#111417] text-lg font-bold">
                    Cơ cấu doanh thu
                  </h3>
                  <button class="text-[#637588] hover:text-primary">
                    <span class="material-symbols-outlined text-[20px]"
                      >more_horiz</span
                    >
                  </button>
                </div>

                <div
                  class="flex items-center justify-center py-4 relative h-56"
                >
                  <canvas id="categoryChart"></canvas>
                  <div
                    class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none"
                  >
                    <span class="text-xs text-[#637588] mt-1">Tổng cộng</span>
                    <span
                      id="total-revenue-label"
                      class="text-lg font-bold text-[#111417]"
                      >0 ₫</span
                    >
                  </div>
                </div>

                <div
                  id="category-legend"
                  class="flex flex-col gap-3 mt-4 overflow-y-auto max-h-40 pr-2"
                ></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
  <script src="js/common.js"></script>
  <script src="js/statistical.js"></script>
</html>
