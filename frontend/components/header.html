<header
  class="sticky top-0 z-50 w-full bg-white/95 dark:bg-[#17191c]/95 backdrop-blur-md border-b border-[#f0f5f5] dark:border-gray-800 shadow-sm"
>
  <div class="px-4 md:px-10 py-3 max-w-[1440px] mx-auto w-full">
    <div class="flex items-center justify-between gap-4 md:gap-8">
      <a
        class="flex items-center gap-3 text-[#101818] dark:text-white shrink-0"
        href="home.html"
      >
        <div class="size-14 text-primary">
          <img src="image/logo.png" alt="logo" />
        </div>
        <h2 class="text-xl md:text-2xl font-bold tracking-tight">TuComputer Store</h2>
      </a>
      <nav
        class="hidden lg:flex gap-8 text-sm font-semibold h-10 items-center shrink-0"
      >
        <a
          class="hover:text-primary transition-colors flex items-center gap-2"
          href="home.html"
        >
          Trang chủ
        </a>

        <div class="mega-menu-trigger relative h-full flex items-center">
          <button
            class="hover:text-primary transition-colors flex items-center gap-2 cursor-pointer group"
          >
            <span
              class="material-symbols-outlined text-[20px] group-hover:scale-110 transition-transform"
              >grid_view</span
            >
            Danh mục
          </button>
          <div
            class="mega-menu-content hidden absolute top-full left-0 pt-4 w-[850px] z-50"
          >
            <div
              class="bg-white dark:bg-[#1e2125] rounded-xl shadow-2xl border border-gray-100 dark:border-gray-800 flex overflow-hidden min-h-[450px]"
            >
              <div
                class="w-64 border-r border-gray-100 dark:border-gray-800 py-4 shrink-0 bg-gray-50/50 dark:bg-[#1a1c1f]"
              >
                <div id="category-list-container" class="flex flex-col">
                  <p class="text-center text-xs text-gray-400 py-4">
                    Đang tải...
                  </p>
                </div>
              </div>
              <div class="flex-1 p-8 bg-white dark:bg-[#1e2125]">
                <div
                  class="flex flex-col items-center justify-center h-full text-center text-gray-400 gap-4"
                >
                  <span class="material-symbols-outlined text-5xl"
                    >category</span
                  >
                  <p class="text-sm font-medium">
                    Di chuột vào danh mục để khám phá
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </nav>
      <div class="hidden md:flex flex-1 max-w-2xl">
        <label
          class="flex w-full items-center rounded-lg bg-[#f0f5f5] dark:bg-[#25282c] px-3 h-10 ring-1 ring-transparent focus-within:ring-primary transition-all"
        >
          <span
            class="material-symbols-outlined text-[#5e8d8d] dark:text-gray-400"
            >search</span
          >
          <input
            id="search-input-desktop"
            class="w-full bg-transparent border-none focus:ring-0 text-sm px-3 placeholder:text-[#5e8d8d] dark:placeholder:text-gray-500 dark:text-white font-normal"
            placeholder="Tìm kiếm sản phẩm, thương hiệu..."
          />
        </label>
      </div>
      <div class="flex items-center gap-3 md:gap-6 shrink-0">
        <div id="guest-actions" class="flex gap-2">
          <a
            href="login.html"
            class="flex items-center justify-center size-10 rounded-lg hover:bg-[#f0f5f5] dark:hover:bg-[#25282c] transition-colors relative group"
            title="Đăng nhập"
          >
            <span class="material-symbols-outlined">person</span>
          </a>

          <button
            onclick="window.location.href = 'shopping_cart.html'"
            class="flex items-center justify-center size-10 rounded-lg hover:bg-[#f0f5f5] dark:hover:bg-[#25282c] transition-colors relative group"
          >
            <span class="material-symbols-outlined">shopping_cart</span>
            <span
              class="global-cart-badge hidden absolute -top-1 -right-1 bg-primary text-[#101818] text-[10px] font-bold px-1.5 py-0.5 rounded-full ring-2 ring-white dark:ring-[#17191c]"
              >0</span
            >
          </button>
        </div>

        <div id="user-actions" class="hidden flex items-center gap-1 md:gap-2">
          <button
            class="flex items-center justify-center size-10 rounded-lg hover:bg-[#f0f5f5] dark:hover:bg-[#25282c] text-gray-600 dark:text-gray-300 transition-colors relative group"
          >
            <span class="material-symbols-outlined">notifications</span>
            <span
              class="absolute top-2.5 right-2.5 size-2 bg-sale-red rounded-full ring-2 ring-white dark:ring-[#17191c] animate-pulse"
            ></span>
          </button>

          <button
            onclick="window.location.href = 'shopping_cart.html'"
            class="flex items-center justify-center size-10 rounded-lg hover:bg-[#f0f5f5] dark:hover:bg-[#25282c] text-gray-600 dark:text-gray-300 transition-colors relative group mr-1"
          >
            <span class="material-symbols-outlined">shopping_cart</span>
            <span
              class="global-cart-badge hidden absolute -top-1 -right-1 bg-primary text-[#101818] text-[10px] font-bold px-1.5 py-0.5 rounded-full ring-2 ring-white dark:ring-[#17191c]"
              >0</span
            >
          </button>

          <div
            class="h-6 w-px bg-gray-200 dark:bg-gray-700 mx-1 hidden md:block"
          ></div>

          <div class="relative">
            <button
              id="user-menu-btn"
              onclick="toggleUserMenu()"
              class="flex items-center gap-2 rounded-full md:rounded-lg p-0.5 md:py-1.5 md:px-2 hover:bg-[#f0f5f5] dark:hover:bg-[#25282c] transition-all group"
            >
              <div
                class="relative overflow-hidden size-8 rounded-full bg-gradient-to-br from-primary to-[#009999] text-white flex items-center justify-center text-lg font-bold shadow-sm ring-2 ring-white dark:ring-[#17191c]"
              >
                <span class="header-avatar-initials">NA</span>

                <img
                  src=""
                  alt="Avatar"
                  class="header-avatar-img absolute inset-0 w-full h-full object-cover hidden"
                />
              </div>
              <div class="hidden md:flex flex-col items-start">
                <span
                  id="display-name"
                  class="display-name-global text-sm font-semibold text-[#101818] dark:text-white leading-none group-hover:text-primary transition-colors"
                >
                  Loading...
                </span>
              </div>
              <span
                class="material-symbols-outlined text-gray-400 text-lg hidden md:block group-hover:text-primary transition-colors"
                >expand_more</span
              >
            </button>

            <div
              id="user-dropdown"
              class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-[#1e2125] rounded-lg shadow-xl border border-gray-100 dark:border-gray-700 py-1 z-50"
            >
              <div
                class="px-4 py-3 border-b border-gray-100 dark:border-gray-700"
              >
                <p
                  class="text-sm text-gray-900 dark:text-white font-bold truncate"
                  id="dropdown-name"
                >
                  User Name
                </p>
                <p class="text-xs text-gray-500 truncate" id="dropdown-email">
                  user@example.com
                </p>
              </div>
              <a
                href="user_infor.html"
                class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-[#25282c]"
                >Hồ sơ cá nhân</a
              >
              <a
                href="order.html"
                class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-[#25282c]"
                >Đơn mua</a
              >
              <div
                class="border-t border-gray-100 dark:border-gray-700 my-1"
              ></div>
              <button
                onclick="AuthUtils.logout()"
                class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100 dark:hover:bg-[#25282c] flex items-center gap-2"
              >
                <span class="material-symbols-outlined text-[18px]"
                  >logout</span
                >
                Đăng xuất
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="md:hidden mt-3">
      <label
        class="flex w-full items-center rounded-lg bg-[#f0f5f5] dark:bg-[#25282c] px-3 h-10"
      >
        <span class="material-symbols-outlined text-[#5e8d8d]">search</span>
        <input
          id="search-input-mobile"
          class="w-full bg-transparent border-none focus:ring-0 text-sm px-3 placeholder:text-[#5e8d8d] dark:placeholder:text-gray-500 dark:text-white"
          placeholder="Tìm kiếm..."
        />
      </label>
    </div>
  </div>
</header>
