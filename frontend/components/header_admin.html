<header
  class="h-16 w-full bg-surface-light border-b border-[#e5e7eb] flex items-center justify-between px-6 shrink-0 z-20"
>
  <div class="flex items-center gap-4">
    <button class="lg:hidden text-[#637588]">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <h2 class="text-lg font-bold text-[#111417]" id="admin-page-title">
      Bảng điều khiển
    </h2>
  </div>
  <div class="flex items-center gap-4">
    <button
      class="flex items-center gap-2 h-9 px-4 rounded-lg bg-primary text-white text-sm font-bold hover:bg-blue-600 transition-colors shadow-sm"
    >
      <span class="material-symbols-outlined text-[18px]">storefront</span>
      <span class="hidden sm:inline">Xem cửa hàng</span>
    </button>
    <button
      class="size-9 flex items-center justify-center rounded-full text-[#637588] hover:bg-[#f0f2f4] relative"
    >
      <span class="material-symbols-outlined">notifications</span>
      <span
        class="absolute top-2 right-2 size-2 bg-red-500 rounded-full border border-white"
      ></span>
    </button>
    <div class="h-8 w-px bg-[#e5e7eb] mx-1"></div>
    <div class="flex items-center gap-3 cursor-pointer">
      <div class="text-right hidden sm:block">
        <p
          id="admin-display-name"
          class="text-sm font-bold text-[#111417] leading-none"
        >
          Đang tải...
        </p>
        <p class="text-xs text-[#637588] mt-1" id="admin-role-name">...</p>
      </div>
      <div
        id="admin-avatar"
        class="size-9 rounded-full bg-cover bg-center border border-[#e5e7eb] flex items-center justify-center bg-primary text-white font-bold"
        style="background-image: none"
      >
        <span id="admin-initials">AD</span>
      </div>
    </div>
  </div>
</header>
