<!doctype html>
<html lang="vi" class="light">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TuComputer Store</title>
    <link rel="stylesheet" href="css/home.css" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#00c7c7",
              "background-light": "#ffffff",
              "background-dark": "#17191c",
              "sale-red": "#ef4444",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              display: ["Inter", "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      body {
        font-family: "Inter", sans-serif;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .mega-menu-trigger:hover .mega-menu-content {
        display: flex;
      }
      .category-item:hover .subcategory-panel {
        display: block;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .compare-table tr {
        border-bottom: 1px solid #f1f5f9;
      }
      .compare-table td,
      .compare-table th {
        padding: 16px;
      }
      .sticky-col {
        position: sticky;
        left: 0;
        background: white;
        z-index: 10;
      }
    </style>
  </head>
  <body class="bg-[#f8fafc] font-display text-gray-800">
    <div id="header-placeholder"></div>

    <main class="max-w-[1400px] mx-auto px-4 py-8 min-h-[70vh]">
      <div class="flex items-center gap-2 mb-6">
        <a
          href="products.html"
          class="text-gray-500 hover:text-primary flex items-center gap-1 text-sm font-bold"
        >
          <span class="material-symbols-outlined text-[18px]">arrow_back</span>
          Quay lại
        </a>
      </div>

      <h1 class="text-2xl font-black text-gray-900 mb-8">So sánh sản phẩm</h1>

      <div
        class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden"
      >
        <div class="overflow-x-auto">
          <table
            class="w-full text-left border-collapse compare-table min-w-[800px]"
          >
            <thead>
              <tr id="compare-header-row" class="bg-gray-50/50">
                <th class="w-1/4 min-w-[200px] sticky-col bg-gray-50">
                  <span
                    class="text-sm font-bold text-gray-400 uppercase tracking-widest"
                    >Đặc điểm</span
                  >
                </th>
              </tr>
            </thead>
            <tbody id="compare-body"></tbody>
          </table>
        </div>
      </div>

      <div id="no-compare-data" class="hidden text-center py-20">
        <span class="material-symbols-outlined text-6xl text-gray-200 mb-4"
          >analytics</span
        >
        <p class="text-gray-500 font-bold">
          Vui lòng chọn ít nhất 2 sản phẩm để so sánh.
        </p>
        <a
          href="products.html"
          class="mt-4 inline-block bg-primary text-white px-6 py-2 rounded-xl font-bold"
          >Chọn ngay</a
        >
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </body>
  <script src="js/common.js"></script>
  <script src="js/compare.js"></script>
</html>
