<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Laptop - TuComputer</title>

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#00c7c7",
              "primary-dark": "#00a3a3",
              "background-light": "#ffffff",
              "background-dark": "#17191c",
              "surface-dark": "#1e2125",
              "sale-red": "#ef4444",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      body {
        font-family: "Inter", sans-serif;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .mega-menu-trigger:hover .mega-menu-content {
        display: flex;
      }
      .category-item:hover .subcategory-panel {
        display: block;
      }
      .custom-checkbox:checked {
        background-color: #00c7c7;
        border-color: #00c7c7;
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <div id="header-placeholder"></div>

    <div
      class="flex-1 w-full max-w-[1920px] mx-auto px-4 md:px-10 py-6 md:py-8"
    >
      <nav class="flex mb-6 text-sm text-gray-500 dark:text-gray-400">
        <ol class="inline-flex items-center space-x-1 md:space-x-3">
          <li class="inline-flex items-center">
            <a class="hover:text-primary transition-colors" href="home.html"
              >Trang chủ</a
            >
          </li>
          <li>
            <div class="flex items-center">
              <span class="material-symbols-outlined text-base mx-1"
                >chevron_right</span
              >
              <span class="font-medium text-gray-800 dark:text-gray-200"
                >Laptop</span
              >
            </div>
          </li>
        </ol>
      </nav>
      <main class="w-full flex flex-col lg:flex-row gap-6 md:gap-8">
        <aside class="w-full lg:w-1/4 xl:w-[280px] flex-shrink-0">
          <button
            onclick="
              document
                .getElementById('filter-sidebar')
                .classList.toggle('hidden')
            "
            class="lg:hidden w-full mb-4 flex items-center justify-center gap-2 bg-white dark:bg-[#1e2125] border border-gray-200 dark:border-gray-700 px-6 py-3 rounded-xl font-bold text-sm shadow-sm hover:border-primary transition-all"
          >
            <span class="material-symbols-outlined text-primary"
              >filter_list</span
            >
            Hiển thị bộ lọc
          </button>

          <div
            id="filter-sidebar"
            class="hidden lg:flex flex-col bg-white dark:bg-[#1e2125] p-5 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm gap-6 sticky top-24"
          >
            <div
              class="flex items-center justify-between pb-4 border-b border-gray-100 dark:border-gray-800"
            >
              <h3
                class="font-black text-lg text-gray-800 dark:text-white flex items-center gap-2"
              >
                <span class="material-symbols-outlined text-primary"
                  >filter_alt</span
                >
                Bộ lọc
              </h3>
              <button
                onclick="resetFilters()"
                class="text-sm text-gray-500 hover:text-sale-red font-semibold transition-colors"
              >
                Xóa tất cả
              </button>
            </div>

            <div>
              <h4
                class="text-sm font-black uppercase mb-3 text-gray-800 dark:text-gray-200"
              >
                Khoảng giá (VNĐ)
              </h4>
              <div class="flex items-center gap-2 mb-3">
                <input
                  id="min-price"
                  type="number"
                  placeholder="Từ"
                  class="w-full bg-gray-50 dark:bg-[#17191c] border border-gray-200 dark:border-gray-700 rounded-lg text-sm p-2 font-medium"
                />
                <span class="text-gray-400">-</span>
                <input
                  id="max-price"
                  type="number"
                  placeholder="Đến"
                  class="w-full bg-gray-50 dark:bg-[#17191c] border border-gray-200 dark:border-gray-700 rounded-lg text-sm p-2 font-medium"
                />
              </div>
              <button
                onclick="applyFilters()"
                class="w-full bg-primary text-[#101818] py-2 rounded-lg font-bold shadow-sm hover:bg-primary-dark transition-colors text-sm"
              >
                Áp dụng giá
              </button>
            </div>

            <hr class="border-gray-100 dark:border-gray-800" />

            <div id="dynamic-specs-container" class="flex flex-col gap-6">
              <div class="text-sm text-gray-400">Đang tải cấu hình...</div>
            </div>
          </div>
        </aside>

        <div class="flex-1 min-w-0">
          <div
            class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6 pb-4 border-b border-gray-200 dark:border-gray-800"
          >
            <div>
              <h1
                id="category-title"
                class="text-2xl md:text-3xl font-black text-[#101818] dark:text-white mb-1"
              >
                Đang tải...
              </h1>
              <p
                class="text-sm text-gray-500 dark:text-gray-400 font-medium uppercase tracking-wider"
              >
                Tìm thấy
                <strong id="product-count" class="text-primary">0</strong>
              </p>
            </div>

            <div class="flex items-center gap-3">
              <label
                class="text-sm font-bold text-gray-500 dark:text-gray-400 whitespace-nowrap"
                for="sort"
                >Sắp xếp:</label
              >
              <div class="relative">
                <select
                  class="appearance-none bg-white dark:bg-[#1e2125] border border-gray-200 dark:border-gray-700 text-[#101818] dark:text-white text-sm rounded-xl focus:ring-primary focus:border-primary block w-48 p-2.5 pr-8 cursor-pointer font-bold shadow-sm"
                  id="sort"
                >
                  <option value="createdAt-desc">Mới nhất</option>
                  <option value="salePrice-asc">Giá thấp đến cao</option>
                  <option value="salePrice-desc">Giá cao đến thấp</option>
                </select>
                <div
                  class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-500"
                >
                  <span class="material-symbols-outlined text-sm"
                    >expand_more</span
                  >
                </div>
              </div>
            </div>
          </div>

          <div
            id="product-list"
            class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 mb-12"
          >
            <div
              class="animate-pulse bg-white dark:bg-[#1e2125] rounded-xl p-3 h-80"
            ></div>
            <div
              class="animate-pulse bg-white dark:bg-[#1e2125] rounded-xl p-3 h-80"
            ></div>
            <div
              class="animate-pulse bg-white dark:bg-[#1e2125] rounded-xl p-3 h-80"
            ></div>
            <div
              class="animate-pulse bg-white dark:bg-[#1e2125] rounded-xl p-3 h-80"
            ></div>
          </div>

          <div
            id="empty-state"
            class="hidden flex-col items-center justify-center py-20 text-center"
          >
            <span class="material-symbols-outlined text-6xl text-gray-300 mb-4"
              >inventory_2</span
            >
            <h3 class="text-xl font-bold text-gray-500">
              Chưa có sản phẩm nào phù hợp
            </h3>
          </div>

          <div
            id="pagination"
            class="flex justify-center items-center gap-2"
          ></div>
        </div>
      </main>
    </div>

    <div id="footer-placeholder"></div>

    <button
      id="chat-toggle-btn"
      onclick="toggleChat()"
      class="fixed bottom-6 right-6 bg-primary text-[#101818] p-4 rounded-full shadow-lg hover:scale-110 transition-transform z-50"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"
        />
      </svg>
    </button>

    <div
      id="chat-window"
      style="height: 500px"
      class="fixed bottom-6 right-6 w-80 md:w-96 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl shadow-2xl flex flex-col hidden z-50 overflow-hidden"
    >
      <div
        class="bg-primary text-[#101818] p-4 flex justify-between items-center shrink-0"
      >
        <h3 class="font-bold">TCP Store Assistant</h3>
        <button
          onclick="toggleChat()"
          class="text-[#101818] hover:text-white transition"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <div
        id="chat-messages"
        class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50 dark:bg-gray-800 text-sm min-h-0"
      >
        <div class="flex justify-start mb-4">
          <div
            class="message-content bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 p-3 rounded-br-lg rounded-tr-lg rounded-tl-lg max-w-[85%] break-words shadow-sm"
          >
            Xin chào! TCP Store có thể giúp gì cho bạn?
          </div>
        </div>
      </div>

      <div
        class="p-3 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-700 flex gap-2 shrink-0"
      >
        <input
          type="text"
          id="chat-input"
          placeholder="Nhập tin nhắn..."
          class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-primary dark:bg-gray-800 dark:text-white"
          onkeypress="handleKeyPress(event)"
        />
        <button
          onclick="sendMessage()"
          class="bg-primary text-[#101818] px-4 py-2 rounded-lg font-bold hover:opacity-90"
        >
          Gửi
        </button>
      </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/product.js"></script>
  </body>
</html>
