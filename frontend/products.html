<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Laptop - TuComputer</title>

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#00c7c7",
              "primary-dark": "#00a3a3",
              "background-light": "#ffffff",
              "background-dark": "#17191c",
              "surface-dark": "#1e2125",
              "sale-red": "#ef4444",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      body {
        font-family: "Inter", sans-serif;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .mega-menu-trigger:hover .mega-menu-content {
        display: flex;
      }
      .category-item:hover .subcategory-panel {
        display: block;
      }
      .custom-checkbox:checked {
        background-color: #00c7c7;
        border-color: #00c7c7;
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <div id="header-placeholder"></div>

    <div
      class="flex-1 w-full max-w-[1920px] mx-auto px-4 md:px-10 py-6 md:py-8"
    >
      <nav class="flex mb-6 text-sm text-gray-500 dark:text-gray-400">
        <ol class="inline-flex items-center space-x-1 md:space-x-3">
          <li class="inline-flex items-center">
            <a class="hover:text-primary transition-colors" href="home.html"
              >Trang chủ</a
            >
          </li>
          <li>
            <div class="flex items-center">
              <span class="material-symbols-outlined text-base mx-1"
                >chevron_right</span
              >
              <span class="font-medium text-gray-800 dark:text-gray-200"
                >Laptop</span
              >
            </div>
          </li>
        </ol>
      </nav>
      <main class="w-full">
        <div
          class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8 pb-6 border-b border-gray-200 dark:border-gray-800"
        >
          <div>
            <h1
              id="category-title"
              class="text-4xl font-black text-[#101818] dark:text-white mb-2"
            >
              Đang tải...
            </h1>
            <p
              class="text-sm text-gray-500 dark:text-gray-400 font-medium uppercase tracking-wider"
            >
              Tìm thấy
              <strong id="product-count" class="text-primary">0</strong>
            </p>
          </div>
          <div class="flex items-center gap-4">
            <button
              class="flex items-center gap-2 bg-white dark:bg-[#1e2125] border border-gray-200 dark:border-gray-700 px-6 py-2.5 rounded-xl font-bold text-sm shadow-sm hover:border-primary transition-all"
            >
              <span class="material-symbols-outlined text-primary"
                >filter_list</span
              >
              Bộ lọc
            </button>
            <div class="flex items-center gap-3">
              <label
                class="text-sm font-bold text-gray-500 dark:text-gray-400 whitespace-nowrap"
                for="sort"
                >Sắp xếp:</label
              >
              <div class="relative">
                <select
                  class="appearance-none bg-white dark:bg-[#1e2125] border border-gray-200 dark:border-gray-700 text-[#101818] dark:text-white text-sm rounded-xl focus:ring-primary focus:border-primary block w-48 p-2.5 pr-8 cursor-pointer font-bold shadow-sm"
                  id="sort"
                >
                  <option>Mới nhất</option>
                  <option>Giá thấp đến cao</option>
                  <option>Giá cao đến thấp</option>
                </select>
                <div
                  class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-500"
                >
                  <span class="material-symbols-outlined text-sm"
                    >expand_more</span
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
        <div
          id="product-list"
          class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 mb-12"
        >
          <div
            class="animate-pulse bg-white dark:bg-[#1e2125] rounded-xl p-3 h-80"
          ></div>
          <div
            class="animate-pulse bg-white dark:bg-[#1e2125] rounded-xl p-3 h-80"
          ></div>
          <div
            class="animate-pulse bg-white dark:bg-[#1e2125] rounded-xl p-3 h-80"
          ></div>
          <div
            class="animate-pulse bg-white dark:bg-[#1e2125] rounded-xl p-3 h-80"
          ></div>
        </div>

        <div
          id="empty-state"
          class="hidden flex-col items-center justify-center py-20 text-center"
        >
          <span class="material-symbols-outlined text-6xl text-gray-300 mb-4"
            >inventory_2</span
          >
          <h3 class="text-xl font-bold text-gray-500">
            Chưa có sản phẩm nào trong danh mục này
          </h3>
          <a
            href="home.html"
            class="mt-6 px-6 py-2 bg-primary text-white font-bold rounded-lg hover:bg-primary-dark"
            >Về trang chủ</a
          >
        </div>

        <div
          id="pagination"
          class="flex justify-center items-center gap-2"
        ></div>
      </main>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/common.js"></script>
    <script src="js/product.js"></script>
  </body>
</html>
